<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>file-tree touch drag-and-drop fixture</title>
    <style>
      body {
        margin: 0;
        padding: 16px;
        font-family: system-ui, sans-serif;
      }
      file-tree-container {
        display: block;
        width: 300px;
        height: 500px;
        border: 1px solid #ccc;
      }
    </style>
  </head>
  <body>
    <file-tree-container id="touch-dnd-host"></file-tree-container>

    <script type="module">
      import '/dist/web-components.js';
      import { FileTree } from '/dist/index.js';

      const host = document.getElementById('touch-dnd-host');

      const fileTree = new FileTree(
        {
          initialFiles: [
            'README.md',
            'package.json',
            'src/index.ts',
            'src/utils.ts',
            'src/components/Button.tsx',
            'src/components/Card.tsx',
            'lib/helper.ts',
            'lib/constants.ts',
          ],
          dragAndDrop: true,
        },
        {
          initialExpandedItems: ['src', 'src/components', 'lib'],
          onFilesChange: (files) => {
            window.__lastFilesChange = files;
          },
        }
      );
      fileTree.render({ fileTreeContainer: host });

      // Expose the FileTree instance for test introspection
      window.__fileTree = fileTree;

      const waitForShadowTree = async () => {
        const started = performance.now();
        while (true) {
          const root = host.shadowRoot;
          if (
            root != null &&
            root.querySelector('[data-type="item"]') != null
          ) {
            return;
          }
          if (performance.now() - started > 5000) {
            throw new Error('Timed out waiting for file-tree render');
          }
          await new Promise((resolve) => setTimeout(resolve, 16));
        }
      };

      await waitForShadowTree();
      window.__fileTreeFixtureReady = true;
    </script>
  </body>
</html>
